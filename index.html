<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Level Assessment</title>
    <link rel="dns-prefetch" href="//www.videoask.com">
    <style>
        /* Base Styles */
        body, html { margin: 0; padding: 0; height: 100%; background-color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
        
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 15px; box-sizing: border-box; }
        
        /* Logo: Optimized for 119x50 dimensions */
        .logo { width: 119px; height: 50px; margin-bottom: 25px; object-fit: contain; }
        
        /* The High-Speed Facade */
        #gate { 
            text-align: center; 
            cursor: pointer; 
            width: 100%; 
            max-width: 400px; 
            height: 560px; 
            border: 2px solid #379cfb; 
            background: #fdfdfd; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 24px; 
            box-shadow: 0 12px 40px rgba(0,0,0,0.08);
            transition: transform 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        #gate:hover { transform: scale(1.01); }

        /* New Square/Rounded Button */
        .start-btn { 
            background: #379cfb; 
            color: white;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            display: inline-block;
            box-shadow: 0 6px 20px rgba(55, 156, 251, 0.4);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        h2 { color: #1a1a1a; font-size: 24px; margin: 10px 0 0 0; font-weight: 800; letter-spacing: -0.5px; }
        p { color: #666; font-size: 16px; margin-top: 8px; font-weight: 400; }

        /* Iframe styling for the reveal */
        iframe { border-radius: 22px; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://businessenglishwithvitu.com/wp-content/uploads/2025/12/资源-4.png" alt="Business English with Vitu" class="logo">

        <div id="gate">
            <div>
                <div class="start-btn">
                    Start English Check
                </div>
                <h2>Assessment Portal</h2>
                <p>Tap to begin your video quiz</p>
            </div>
        </div>
    </div>

    <script>
        // Replaces facade with VideoAsk on interaction
        document.getElementById('gate').addEventListener('click', function() {
            this.style.background = "#000";
            this.innerHTML = `<iframe src="https://www.videoask.com/fa1w7kdsr?autoplay=1" allow="autoplay *; encrypted-media *; fullscreen *; display-capture *;"></iframe>`;
        });
    </script>

</body>
</html>
