<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>English Level Assessment</title>
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background-color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
            overflow: hidden; 
        }
        
        .container { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; padding: 15px; box-sizing: border-box; 
        }
        
        .logo { width: 119px; height: 50px; margin-bottom: 25px; object-fit: contain; }
        
        .portal-box {
            width: 100%;
            max-width: 400px;
            height: 560px;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 12px 40px rgba(0,0,0,0.08);
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="container">
    <a href="https://businessenglishwithvitu.com" target="_blank" style="text-decoration: none;">
        <img src="logo.png" 
             alt="Business English with Vitu" 
             class="logo" 
             fetchpriority="high" 
             loading="eager">
    </a>
        
        <div class="portal-box">
            <iframe 
                src="https://www.videoask.com/fa1w7kdsr?autoplay=1&m=1&muted=1" 
                allow="autoplay; fullscreen; encrypted-media; camera; microphone;"
                loading="lazy">
                
            </iframe>
        </div>
    </div>

</body>
</html>
