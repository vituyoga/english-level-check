<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Level Assessment</title>
    <link rel="dns-prefetch" href="//www.videoask.com">
    <style>
        /* Base Styles */
        body, html { margin: 0; padding: 0; height: 100%; background-color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
        
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 15px; box-sizing: border-box; }
        
        /* Logo: Optimized for 119x50 dimensions */
        .logo { width: 119px; height: 50px; margin-bottom: 20px; object-fit: contain; }
        
        /* The High-Speed Facade */
        #gate { 
            text-align: center; 
            cursor: pointer; 
            width: 100%; 
            max-width: 400px; 
            height: 560px; 
            border: 2px solid #379cfb; 
            background: #fdfdfd; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 20px; 
            box-shadow: 0 12px 30px rgba(0,0,0,0.07);
            transition: transform 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        #gate:hover { transform: scale(1.01); }

        .play-btn { 
            width: 75px; 
            height: 75px; 
            background: #379cfb; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin-bottom: 20px; 
            margin-left: auto; 
            margin-right: auto;
            box-shadow: 0 8px 20px rgba(55, 156, 251, 0.3);
        }

        h2 { color: #1a1a1a; font-size: 22px; margin: 0; font-weight: 700; letter-spacing: -0.5px; }
        p { color: #379cfb; font-size: 17px; margin-top: 10px; font-weight: 500; }

        /* Iframe styling for the reveal */
        iframe { border-radius: 18px; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://businessenglishwithvitu.com/wp-content/uploads/2025/12/资源-4.png" alt="Business English with Vitu" class="logo">

        <div id="gate">
            <div>
                <div class="play-btn">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="white">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                </div>
                <h2>Check Your English Level</h2>
                <p>Tap to start video assessment</p>
            </div>
        </div>
    </div>

    <script>
        // Replaces facade with VideoAsk on interaction
        document.getElementById('gate').addEventListener('click', function() {
            this.style.background = "#000";
            this.innerHTML = `<iframe src="https://www.videoask.com/fa1w7kdsr?autoplay=1" allow="autoplay *; encrypted-media *; fullscreen *; display-capture *;"></iframe>`;
        });
    </script>

</body>
</html>
